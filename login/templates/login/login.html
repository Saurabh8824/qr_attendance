{% load static %}
<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — QR Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:    #06050a;
      --ink2:   #0d0b14;
      --surface: rgba(255,255,255,0.03);
      --border:  rgba(255,255,255,0.06);
      --purple:   #9d4edd;
      --purple2:  #c77dff;
      --text:   #f3f0f7;
      --muted:  rgba(243,240,247,0.45);
      --danger: #ff6b6b;
      --radius: 20px;
      --maxw:   420px;
      --lamp-glow: radial-gradient(circle at center, rgba(157, 78, 221, 0.22) 0%, rgba(157, 78, 221, 0.08) 45%, transparent 75%);
      --bg-grid-color: rgba(255,255,255,0.02);
    }

    /* ─── Light Theme Overrides ─── */
    body.light-theme {
      --ink:    #f6f5fa;
      --ink2:   #ffffff;
      --surface: rgba(0,0,0,0.025);
      --border:  rgba(0,0,0,0.07);
      --purple:   #6200ee;
      --purple2:  #7f39fb;
      --text:   #120e1a;
      --muted:  rgba(18,14,26,0.6);
      --danger: #e03131;
      --lamp-glow: radial-gradient(ellipse at top, rgba(232, 200, 138, 0.65) 0%, rgba(232, 200, 138, 0.25) 40%, rgba(232, 200, 138, 0.05) 65%, transparent 80%);
      --bg-grid-color: rgba(98,0,238,0.03);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--ink);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      cursor: default;
      transition: background-color 0.5s ease, color 0.3s ease;
    }

    /* ─── Realistic Industrial Lamp Component ─── */
    .lamp-container {
      position: fixed;
      top: 0;
      right: 15%;
      z-index: 100;
      width: 100px;
      height: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lamp-fixture {
      width: 64px;
      height: auto;
      overflow: visible;
    }

    .lamp-metal { fill: #2a2635; transition: fill 0.3s; }
    body.light-theme .lamp-metal { fill: #4a4557; }
    
    .lamp-accent { fill: var(--purple); transition: fill 0.3s; }
    .lamp-bulb { fill: #444; transition: fill 0.3s; }
    
    body.light-theme .lamp-bulb { 
      fill: #ffeaa7; 
      filter: drop-shadow(0 0 10px #ffe596);
    }

    .lamp-rope-wrapper {
      position: relative;
      width: 30px;
      height: 120px;
      margin-top: -5px;
      cursor: pointer;
    }

    .lamp-rope {
      position: absolute;
      left: 50%;
      top: 0;
      width: 1.5px;
      height: 95px;
      background: linear-gradient(to bottom, #555, #888, #444);
      transform: translateX(-50%);
      transition: height 0.15s ease-out;
    }
    body.light-theme .lamp-rope { background: linear-gradient(to bottom, #888, #bbb, #777); }

    .lamp-handle {
      position: absolute;
      left: 50%;
      top: 92px;
      width: 8px;
      height: 18px;
      background: linear-gradient(135deg, #777, #bbb, #555);
      border-radius: 2px;
      transform: translateX(-50%);
      transition: top 0.15s ease-out;
      box-shadow: 0 3px 6px rgba(0,0,0,0.4);
    }
    body.light-theme .lamp-handle { background: linear-gradient(135deg, var(--purple), var(--purple2)); }

    .lamp-rope-wrapper:active .lamp-rope { height: 110px; }
    .lamp-rope-wrapper:active .lamp-handle { top: 107px; }

    .lamp-glow-area {
      position: absolute;
      top: 45px;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      pointer-events: none;
      z-index: -1;
      background: var(--lamp-glow);
      opacity: 1;
      transition: background 0.5s ease;
    }

    /* ─── Animated grid background ─── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--bg-grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid-color) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      animation: gridpulse 8s ease-in-out infinite;
    }
    @keyframes gridpulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

    /* ─── Corner accent lines ─── */
    .corner {
      position: fixed;
      width: 140px; height: 140px;
      pointer-events: none; z-index: 1;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: linear-gradient(90deg, var(--purple), transparent);
      opacity: 0.25;
    }
    .corner.tl { top: 0; left: 0; }
    .corner.tl::before { width: 100%; height: 1px; top: 48px; left: 48px; }
    .corner.tl::after  { width: 1px; height: 100%; top: 48px; left: 48px; }

    .corner.br { bottom: 0; right: 0; transform: rotate(180deg); }
    .corner.br::before { width: 100%; height: 1px; top: 48px; left: 48px; }
    .corner.br::after  { width: 1px; height: 100%; top: 48px; left: 48px; }

    /* ─── Wrap & card ─── */
    .wrap {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%; max-width: var(--maxw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 32px 80px rgba(0,0,0,0.5),
        0 0 120px rgba(157, 78, 221, 0.03);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    body.light-theme .card {
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.01) inset,
        0 24px 60px rgba(0,0,0,0.06),
        0 0 80px rgba(98, 0, 238, 0.02);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Brand header ─── */
    .brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .logo-mark {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 15px;
      color: #ffffff;
      box-shadow: 0 6px 24px rgba(157, 78, 221, 0.3);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .logo-mark::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
    }
    .brand-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .brand-text p {
      font-size: 12px; color: var(--muted);
      margin-top: 2px; font-weight: 300;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* ─── Divider ─── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 28px;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    /* ─── Messages ─── */
    .messages {
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: 10px; padding: 12px 14px;
      color: var(--danger); font-size: 13px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease both;
    }

    /* ─── Form ─── */
    form { display: flex; flex-direction: column; gap: 18px; }

    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group { animation: fadeUp 0.6s ease both; }
    .form-group:nth-child(1) { animation-delay: 0.2s; }
    .form-group:nth-child(2) { animation-delay: 0.28s; }
    .form-group:nth-child(3) { animation-delay: 0.34s; }
    .form-group:nth-child(4) { animation-delay: 0.4s; }

    label {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted);
    }

    .field {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.015);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 16px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    body.light-theme .field { background: rgba(0,0,0,0.01); }
    
    .field:focus-within {
      border-color: rgba(157, 78, 221, 0.4);
      background: rgba(157, 78, 221, 0.03);
      box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.06);
    }
    .field svg { flex-shrink: 0; color: var(--muted); transition: color 0.2s; }
    .field:focus-within svg { color: var(--purple); }
    .field input {
      flex: 1; background: transparent; border: 0; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 400;
    }
    .field input::placeholder { color: rgba(243,240,247,0.22); }
    body.light-theme .field input::placeholder { color: rgba(0, 0, 0, 0.3); }

    /* ─── Remember & forgot row ─── */
    .aux-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; color: var(--muted);
    }
    .check-label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
    }
    .check-label input[type="checkbox"] {
      accent-color: var(--purple);
      width: 15px; height: 15px; cursor: pointer;
    }
    .forgot-link {
      color: var(--muted); text-decoration: none;
      font-size: 12px; letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--purple2); }

    /* ─── Submit button ─── */
    .btn {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px; border-radius: 12px; border: 0;
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ffffff;
      background: linear-gradient(100deg, var(--purple) 0%, var(--purple2) 50%, var(--purple) 100%);
      background-size: 200% 100%;
      box-shadow: 0 8px 24px rgba(157, 78, 221, 0.2), 0 2px 8px rgba(0,0,0,0.2);
      transition: background-position 0.4s ease, box-shadow 0.2s, transform 0.15s;
    }
    .btn:hover {
      background-position: 100% 0;
      box-shadow: 0 12px 32px rgba(157, 78, 221, 0.3), 0 2px 8px rgba(0,0,0,0.2);
    }
    .btn:active { transform: translateY(1px); }
    .btn-shine {
      position: absolute; top: 0; left: -80%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-20deg);
      animation: shine 3s 1.5s ease infinite;
    }
    @keyframes shine { 0%{left:-80%} 40%,100%{left:140%} }

    /* ─── Student link ─── */
    .student-link {
      text-align: center; font-size: 13px;
      color: var(--muted); margin-top: 6px;
    }
    .student-link a {
      color: var(--purple2); font-weight: 600;
      text-decoration: none;
      border-bottom: 1px solid rgba(157, 78, 221, 0.3);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .student-link a:hover { color: var(--text); border-color: var(--text); }

    /* ─── Footer ─── */
    .foot {
      text-align: center; font-size: 11px;
      color: var(--muted); opacity: 0.4;
      margin-top: 28px; letter-spacing: 0.05em;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    /* ─── Mobile Adjustments ─── */
    @media (pointer: coarse), (max-width: 600px) {
      .card { padding: 28px 22px; }
      .brand-text h1 { font-size: 15px; }
      .lamp-container { right: 5%; transform: scale(0.85); transform-origin: top right; }
    }

    /* ─── Mobile animated ring (pulse) ─── */
    .mobile-ring {
      display: none;
      position: fixed;
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 1px solid rgba(157, 78, 221, 0.08);
      top: -60px; right: -60px;
      animation: ringpulse 5s ease-in-out infinite;
    }
    .mobile-ring:nth-child(2) {
      width: 320px; height: 320px;
      top: -100px; right: -100px;
      animation-delay: 1.5s;
      border-color: rgba(157, 78, 221, 0.04);
    }
    @keyframes ringpulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.06); opacity: 0.5; }
    }
    @media (pointer: coarse), (max-width: 600px) {
      .mobile-ring { display: block; }
    }
  </style>
</head>
<body>

  <div class="lamp-container">
    <svg class="lamp-fixture" viewBox="0 0 64 50">
      <path d="M22 0 L42 0 L38 4 L26 4 Z" fill="#15121e" />
      <rect x="31" y="4" width="2" height="18" fill="#1f1b29" />
      <path class="lamp-metal" d="M16 34 C16 24, 48 24, 48 34 L54 42 L10 42 Z" />
      <rect class="lamp-accent" x="24" y="22" width="16" height="3" rx="1" />
      <path class="lamp-bulb" d="M24 42 C24 48, 40 48, 40 42 Z" />
    </svg>
    <div class="lamp-rope-wrapper" id="theme-pull-rope" title="Pull to toggle theme">
      <div class="lamp-rope"></div>
      <div class="lamp-handle"></div>
    </div>
    <div class="lamp-glow-area"></div>
  </div>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="corner tl" aria-hidden="true"></div>
  <div class="corner br" aria-hidden="true"></div>

  <div class="wrap">
    <main class="card" role="main" aria-labelledby="login-heading">

      <header class="brand">
        <div class="logo-mark">QR</div>
        <div class="brand-text">
          <h1 id="login-heading">QR Attendance</h1>
          <p>Secure Portal</p>
        </div>
      </header>

      <div class="divider"></div>

      {% if messages %}
        <div class="messages" role="alert">
          {% for msg in messages %}
            {{ msg }}<br>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="form-group">
          <label for="id_username">Username</label>
          <div class="field">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="id_username" name="username" type="text"
                   placeholder="Enter username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="id_password">Password</label>
          <div class="field">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
            </svg>
            <input id="id_password" name="password" type="password"
                   placeholder="Enter password" required autocomplete="current-password">
          </div>
        </div>

        <div class="form-group">
          <div class="aux-row">
            <label class="check-label">
              <input type="checkbox" name="remember">
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
        </div>

        <div class="form-group">
          <button class="btn" type="submit">
            <div class="btn-shine"></div>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Sign In
          </button>
        </div>
      </form>

      <p class="student-link">
        Student? <a href="{% url 'student_signup' %}">Register here</a>
      </p>

    </main>
  </div>

  <div class="foot">© {{ now|date:"Y" }} QR Attendance System. All rights reserved.</div>

  <script>
    /* ── Theme Switcher Engine ── */
    const ropeToggle = document.getElementById('theme-pull-rope');
    
    function setTheme(isLight) {
      if (isLight) {
        document.body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      }
    }

    // Detect system settings or local caches
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      setTheme(savedTheme === 'light');
    } else {
      const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
      setTheme(prefersLight);
    }

    // Pull rope action
    ropeToggle.addEventListener('click', () => {
      const currentIsDark = !document.body.classList.contains('light-theme');
      setTheme(currentIsDark);
    });

    /* ── Autofocus ── */
    try { if (window.innerWidth > 500) document.getElementById('id_username').focus(); } catch(e){}

    /* ── Access Denied Parameter Checker ── */
    (function(){
      const p = new URLSearchParams(window.location.search);
      if (p.get('access') === 'denied') {
        alert('Access Denied');
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    })();
  </script>
</body>
</html>
