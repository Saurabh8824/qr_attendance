{% extends "qr_app/base.html" %}

{% block content %}
<div class="page-wrapper" style="max-width: 800px; margin: 0 auto;">
  
  <div style="margin-bottom: 24px;">
    <h2 class="section-heading">➕ Add Student</h2>
    <p class="section-sub">Fill in the details to register a new student.</p>
  </div>

  <form method="POST" class="pro-card">
    {% csrf_token %}
    
    <div class="row g-4">
      {% for field in form %}
        <div class="col-md-6">
          <label class="form-label">{{ field.label }}</label>
          <!-- Base.html में परिभाषित .pro-input और form-control क्लासेस का उपयोग -->
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
          {% endif %}
        </div>
      {% endfor %}
    </div>

    <div class="d-flex justify-content-end gap-3 mt-4 pt-3" style="border-top: 1px solid var(--border);">
      <a href="{% url 'student_list' %}" class="btn-pro btn-ghost-pro">Cancel</a>
      <button type="submit" class="btn-pro btn-primary-pro">Save Student</button>
    </div>
  </form>

</div>

<style>
  /* फॉर्म फ़ील्ड्स के लिए बेस थीम का सही ओवरराइड */
  .pro-card input, 
  .pro-card select, 
  .pro-card textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-200);
    font-family: 'Sora', sans-serif;
  }
  
  .pro-card input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-pale);
  }
</style>
{% endblock %}
