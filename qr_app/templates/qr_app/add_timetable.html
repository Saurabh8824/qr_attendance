{% extends "qr_app/base.html" %}
{% block content %}

<style>
/* 🎨 Theme Styles mapped with base.html's data-theme architecture */
[data-theme="light"] {
    --card-bg: rgba(255, 255, 255, 0.75);
    --card-border: rgba(60, 50, 30, 0.1);
    --text-main: #16130e;
    --input-bg: #ffffff;
    --input-text: #16130e;
    --input-border: rgba(60, 50, 30, 0.15);
    --shadow: 0 10px 25px rgba(16, 13, 8, 0.08);
}

[data-theme="dark"] {
    --card-bg: rgba(26, 25, 22, 0.75);
    --card-border: rgba(255, 248, 235, 0.08);
    --text-main: #f5f0e8;
    --input-bg: #201e1b;
    --input-text: #f5f0e8;
    --input-border: rgba(255, 248, 235, 0.12);
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.38);
}

.container {
    max-width: 900px;
}

/* 🧊 Beautiful Modern Glassmorphism Card */
.timetable-card {
    background: var(--card-bg) !important;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--card-border) !important;
    border-radius: 18px;
    padding: 30px;
    box-shadow: var(--shadow);
    transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}

.timetable-card h3 {
    color: var(--text-main);
    font-weight: 700;
}

/* 🎛️ Form Components & Inputs */
.form-label {
    color: var(--text-main) !important;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
}

.form-control, .form-select {
    background-color: var(--input-bg) !important;
    border: 1px solid var(--input-border) !important;
    color: var(--input-text) !important;
    border-radius: 10px !important;
    padding: 10px 14px;
    transition: all 0.2s ease;
}

.form-control:focus, .form-select:focus {
    background-color: var(--input-bg) !important;
    color: var(--input-text) !important;
    border-color: var(--accent, #4f63e7) !important;
    box-shadow: 0 0 0 3px rgba(79, 99, 231, 0.15) !important;
}

/* 🌐 Chrome Autofill Fix (Force fields layout styling) */
.form-control:-webkit-autofill,
.form-control:-webkit-autofill:hover, 
.form-control:-webkit-autofill:focus,
.form-select:-webkit-autofill,
.form-select:-webkit-autofill:hover,
.form-select:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--input-text) !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--input-bg) inset !important;
    transition: background-color 5000s ease-in-out 0s;
}

/* Button style overrides */
.btn-primary-custom {
    background: var(--accent-grad, linear-gradient(135deg, #4f63e7 0%, #7c3aed 100%));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 35px;
    font-weight: 600;
    font-size: 14px;
    box-shadow: 0 4px 14px rgba(79, 99, 231, 0.25);
    transition: all 0.2s ease;
}

.btn-primary-custom:hover {
    box-shadow: 0 6px 20px rgba(79, 99, 231, 0.38);
    transform: translateY(-1px);
    filter: brightness(1.06);
}

option {
    background-color: var(--input-bg);
    color: var(--input-text);
}
</style>

<div class="container mt-4">
    <div class="timetable-card">
        <h3 class="text-center mb-4">📅 Add Timetable</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label">Branch</label>
                    <select name="branch" id="branch" class="form-select" required>
                        <option value="">Select Branch</option>
                        {% for b in branches %}
                        <option value="{{ b.id }}">{{ b.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Semester</label>
                    <select name="semester" id="semester" class="form-select" required>
                        <option value="">Select Semester</option>
                        <option value="1">Sem 1</option>
                        <option value="2">Sem 2</option>
                        <option value="3">Sem 3</option>
                        <option value="4">Sem 4</option>
                        <option value="5">Sem 5</option>
                        <option value="6">Sem 6</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Subject</label>
                    <select name="subject" id="subject" class="form-select" required>
                        <option value="">Select Subject</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Day</label>
                    <select name="day" class="form-select">
                        <option value="Mon">Monday</option>
                        <option value="Tue">Tuesday</option>
                        <option value="Wed">Wednesday</option>
                        <option value="Thu">Thursday</option>
                        <option value="Fri">Friday</option>
                        <option value="Sat">Saturday</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Start Time</label>
                    <input type="time" name="start_time" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">End Time</label>
                    <input type="time" name="end_time" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Room</label>
                    <input type="text" name="room" class="form-control" placeholder="Room No">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Teacher Name</label>
                    <input type="text" name="teacher_name" class="form-control" placeholder="Enter teacher's name">
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn-primary-custom">Save Timetable</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById("branch").addEventListener("change", loadSubjects);
document.getElementById("semester").addEventListener("change", loadSubjects);

function loadSubjects() {
    let branch = document.getElementById("branch").value;
    let semester = document.getElementById("semester").value;

    if (!branch || !semester) return;

    fetch("{% url 'ajax_get_subjects' %}?branch=" + branch + "&semester=" + semester)
        .then(res => res.json())
        .then(data => {
            let subjectSelect = document.getElementById("subject");
            subjectSelect.innerHTML = "<option value=''>Select Subject</option>";

            data.results.forEach(sub => {
                subjectSelect.innerHTML += `<option value="${sub.id}">${sub.name}</option>`;
            });
        });
}
</script>

{% endblock %}
