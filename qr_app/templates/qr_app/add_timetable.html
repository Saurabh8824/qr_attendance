{% extends "qr_app/base.html" %}
{% block content %}

<style>
/* 🎨 Global Theme Variables (Catching .dark-mode anywhere in your HTML tree) */
:root {
    --bg-gradient: linear-gradient(135deg, #eef2ff, #f8fafc);
    --card-bg: rgba(255, 255, 255, 0.8);
    --card-border: rgba(0, 0, 0, 0.05);
    --text-main: #1e293b;
    --text-muted: #64748b;
    --input-bg: rgba(255, 255, 255, 0.95);
    --input-border: #cbd5e1;
    --input-text: #1e293b;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
}

/* 🔥 Robust selector matching whether .dark-mode is on <html>, <body>, or wrappers */
.dark-mode, .dark-mode * {
    --bg-gradient: linear-gradient(135deg, #0f172a, #1e1e2f);
    --card-bg: rgba(30, 41, 59, 0.65);
    --card-border: rgba(255, 255, 255, 0.08);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --input-bg: rgba(15, 23, 42, 0.7);
    --input-border: rgba(255, 255, 255, 0.15);
    --input-text: #f8fafc;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}

body {
    background: var(--bg-gradient) !important;
    color: var(--text-main);
    transition: background 0.3s ease, color 0.3s ease;
}

.container {
    max-width: 900px;
}

/* 🧊 Modern Glassmorphic Main Card */
.timetable-card {
    background: var(--card-bg) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--card-border) !important;
    border-radius: 16px;
    padding: 30px;
    box-shadow: var(--shadow);
    transition: background 0.3s ease, border 0.3s ease, box-shadow 0.3s ease;
}

.form-label {
    color: var(--text-main);
    font-weight: 500;
    font-size: 14px;
    margin-bottom: 6px;
}

/* 🎛️ Dynamic Text & Select Inputs */
.form-control, .form-select {
    background-color: var(--input-bg) !important;
    border: 1px solid var(--input-border) !important;
    color: var(--input-text) !important;
    border-radius: 10px;
    padding: 10px 14px;
    transition: all 0.2s ease;
}

.form-control:focus, .form-select:focus {
    background-color: var(--input-bg) !important;
    color: var(--input-text) !important;
    border-color: #6366f1 !important;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25) !important;
}

/* 🌐 Force Fix Google Autofill White Blocker */
.form-control:-webkit-autofill,
.form-control:-webkit-autofill:hover, 
.form-control:-webkit-autofill:focus,
.form-select:-webkit-autofill,
.form-select:-webkit-autofill:hover,
.form-select:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--input-text) !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--input-bg) inset !important;
    transition: background-color 5000s ease-in-out 0s;
}

/* 🚀 Premium Glow Submit Button */
.btn-primary {
    background: linear-gradient(90deg, #6366f1, #9333ea);
    border: none;
    border-radius: 10px;
    padding: 12px 30px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
}

option {
    background-color: var(--input-bg);
    color: var(--input-text);
}
</style>

<div class="container mt-5">
    <div class="timetable-card">
        <h3 class="text-center mb-4" style="color: var(--text-main); font-weight: 700;">📅 Add Timetable</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label">Branch</label>
                    <select name="branch" id="branch" class="form-select" required>
                        <option value="">Select Branch</option>
                        {% for b in branches %}
                        <option value="{{ b.id }}">{{ b.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Semester</label>
                    <select name="semester" id="semester" class="form-select" required>
                        <option value="">Select Semester</option>
                        <option value="1">Sem 1</option>
                        <option value="2">Sem 2</option>
                        <option value="3">Sem 3</option>
                        <option value="4">Sem 4</option>
                        <option value="5">Sem 5</option>
                        <option value="6">Sem 6</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Subject</label>
                    <select name="subject" id="subject" class="form-select" required>
                        <option value="">Select Subject</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Day</label>
                    <select name="day" class="form-select">
                        <option value="Mon">Monday</option>
                        <option value="Tue">Tuesday</option>
                        <option value="Wed">Wednesday</option>
                        <option value="Thu">Thursday</option>
                        <option value="Fri">Friday</option>
                        <option value="Sat">Saturday</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Start Time</label>
                    <input type="time" name="start_time" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">End Time</label>
                    <input type="time" name="end_time" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Room</label>
                    <input type="text" name="room" class="form-control" placeholder="Room No">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Teacher Name</label>
                    <input type="text" name="teacher_name" class="form-control" placeholder="Enter teacher's name">
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary px-5 shadow-sm">Save Timetable</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById("branch").addEventListener("change", loadSubjects);
document.getElementById("semester").addEventListener("change", loadSubjects);

function loadSubjects() {
    let branch = document.getElementById("branch").value;
    let semester = document.getElementById("semester").value;

    if (!branch || !semester) return;

    fetch("{% url 'ajax_get_subjects' %}?branch=" + branch + "&semester=" + semester)
        .then(res => res.json())
        .then(data => {
            let subjectSelect = document.getElementById("subject");
            subjectSelect.innerHTML = "<option value=''>Select Subject</option>";

            data.results.forEach(sub => {
                subjectSelect.innerHTML += `<option value="${sub.id}">${sub.name}</option>`;
            });
        });
}
</script>

{% endblock %}
