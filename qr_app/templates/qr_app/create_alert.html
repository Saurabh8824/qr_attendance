{% extends "qr_app/base.html" %}
{% block content %}

<style>
/* 🎨 Theme Styles mapped with base.html's data-theme architecture */
[data-theme="light"] {
    --card-bg: rgba(255, 255, 255, 0.75);
    --card-border: rgba(60, 50, 30, 0.1);
    --text-main: #16130e;
    --text-muted: #6b6459;
    --input-bg: #ffffff;
    --input-text: #16130e;
    --input-border: rgba(60, 50, 30, 0.15);
    --shadow: 0 10px 25px rgba(16, 13, 8, 0.08);
}

[data-theme="dark"] {
    --card-bg: rgba(26, 25, 22, 0.75);
    --card-border: rgba(255, 248, 235, 0.08);
    --text-main: #f5f0e8;
    --text-muted: #8a8278;
    --input-bg: #201e1b;
    --input-text: #f5f0e8;
    --input-border: rgba(255, 248, 235, 0.12);
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.38);
}

/* 🧊 Modern Glassmorphic Container Form Card */
.form-card {
    max-width: 600px;
    margin: 20px auto;
    background: var(--card-bg) !important;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--card-border) !important;
    padding: 35px;
    border-radius: 18px;
    box-shadow: var(--shadow);
    animation: fadeIn 0.4s ease;
    transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}

.form-title {
    font-weight: 700;
    color: var(--text-main);
}

.form-subtitle {
    font-size: 13px;
    color: var(--text-muted);
}

/* 🎛️ Input Controllers Styling */
.form-label {
    color: var(--text-main) !important;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
}

.form-control, .form-select {
    background-color: var(--input-bg) !important;
    border: 1px solid var(--input-border) !important;
    color: var(--input-text) !important;
    border-radius: 10px !important;
    padding: 10px 14px;
    font-size: 14px;
    transition: all 0.2s ease;
}

.form-control:focus, .form-select:focus {
    background-color: var(--input-bg) !important;
    color: var(--input-text) !important;
    box-shadow: 0 0 0 3px rgba(79, 99, 231, 0.15) !important;
    border-color: var(--accent, #4f63e7) !important;
}

/* 🌐 Chrome Autofill White Blocker styling */
.form-control:-webkit-autofill,
.form-control:-webkit-autofill:hover, 
.form-control:-webkit-autofill:focus,
.form-select:-webkit-autofill,
.form-select:-webkit-autofill:hover,
.form-select:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--input-text) !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--input-bg) inset !important;
    transition: background-color 5000s ease-in-out 0s;
}

/* 🚀 Premium Styled Action Button */
.btn-submit-custom {
    background: var(--accent-grad, linear-gradient(135deg, #4f63e7 0%, #7c3aed 100%));
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: white;
    font-weight: 600;
    width: 100%;
    box-shadow: 0 4px 14px rgba(79, 99, 231, 0.25);
    transition: all 0.2s ease;
}

.btn-submit-custom:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(79, 99, 231, 0.38);
    filter: brightness(1.06);
}

option {
    background-color: var(--input-bg);
    color: var(--input-text);
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>

<div class="form-card">
    <div class="mb-4">
        <h3 class="form-title">📢 Create Alert</h3>
        <p class="form-subtitle">Send notifications to students easily</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Alert Title</label>
            <input type="text" name="title" placeholder="Enter alert title"
                class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea name="message" rows="3"
                placeholder="Enter alert message"
                class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Branch</label>
            <select name="branch" class="form-select">
                <option value="">All Branches</option>
                {% for b in branches %}
                <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Semester</label>
            <select name="semester" class="form-select">
                <option value="">All Semesters</option>
                <option value="1">Sem 1</option>
                <option value="2">Sem 2</option>
                <option value="3">Sem 3</option>
                <option value="4">Sem 4</option>
                <option value="5">Sem 5</option>
                <option value="6">Sem 6</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-select">
                <option value="normal">Normal</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>

        <button type="submit" class="btn-submit-custom">
            🚀 Send Alert
        </button>
    </form>
</div>

{% endblock %}
