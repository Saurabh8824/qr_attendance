{% extends "qr_app/base.html" %}
{% block content %}

<style>
/* 🌟 Light Mode & Core Tokens */
:root {
    --page-bg: linear-gradient(135deg, #eef2ff, #f8fafc);
    --card-bg: #ffffff;
    --card-border: transparent;
    --title-color: #1e293b;
    --subtitle-color: #64748b;
    --input-bg: #ffffff;
    --input-border: #cbd5e1;
    --input-text: #0f172a;
    --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
}

/* 🌟 Dark Mode Theme Customizations */
@media (prefers-color-scheme: dark) {
    :root {
        --page-bg: linear-gradient(135deg, #0f172a, #111827);
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(255, 255, 255, 0.08);
        --title-color: #f8fafc;
        --subtitle-color: #94a3b8;
        --input-bg: #1e293b;
        --input-border: #334155;
        --input-text: #f8fafc;
        --shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }
}

.page-bg {
    background: var(--page-bg);
    min-height: 100vh;
    padding: 40px 20px;
    transition: background 0.3s;
}

.form-card {
    max-width: 600px;
    margin: auto;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 18px;
    box-shadow: var(--shadow);
    animation: fadeIn 0.4s ease;
    transition: background 0.3s, border 0.3s, box-shadow 0.3s;
}

.form-title {
    font-weight: 700;
    color: var(--title-color);
}

.form-subtitle {
    font-size: 13.5px;
    color: var(--subtitle-color);
}

.form-label {
    color: var(--title-color);
    font-weight: 500;
    font-size: 14px;
}

.form-control, .form-select {
    background-color: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--input-text);
    border-radius: 10px;
    padding: 11px;
    font-size: 14px;
    transition: all 0.3s ease;
}

.form-control:focus, .form-select:focus {
    background-color: var(--input-bg);
    color: var(--input-text);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    border-color: #6366f1;
}

.form-select option {
    background-color: var(--input-bg);
    color: var(--input-text);
}

.btn-submit {
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: white;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(99, 102, 241, 0.35);
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 🔥 Google Auto-Fill Styling Fixes */
input:-webkit-autofill,
input:-webkit-autofill:hover, 
input:-webkit-autofill:focus,
textarea:-webkit-autofill,
textarea:-webkit-autofill:hover,
textarea:-webkit-autofill:focus,
select:-webkit-autofill,
select:-webkit-autofill:hover,
select:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--input-text) !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--input-bg) inset !important;
    transition: background-color 5000s ease-in-out 0s;
}
</style>

<div class="page-bg">
    <div class="form-card">
        <div class="mb-4">
            <h3 class="form-title">📢 Create Alert</h3>
            <p class="form-subtitle">Send notifications to students easily</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Alert Title</label>
                <input type="text" name="title" placeholder="Enter alert title"
                    class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" rows="3"
                    placeholder="Enter alert message"
                    class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Branch</label>
                <select name="branch" class="form-select">
                    <option value="">All Branches</option>
                    {% for b in branches %}
                    <option value="{{ b.id }}">{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Semester</label>
                <select name="semester" class="form-select">
                    <option value="">All Semester</option>
                    <option value="1">Sem 1</option>
                    <option value="2">Sem 2</option>
                    <option value="3">Sem 3</option>
                    <option value="4">Sem 4</option>
                    <option value="5">Sem 5</option>
                    <option value="6">Sem 6</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    <option value="normal">Normal</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <button class="btn-submit w-100">
                🚀 Send Alert
            </button>
        </form>
    </div>
</div>

{% endblock %}
