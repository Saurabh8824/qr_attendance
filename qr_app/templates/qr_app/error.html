{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Error</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 450px;
      border-radius: 15px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
      padding: 25px;
      text-align: center;
      background: #fff;
      border-left: 5px solid red;
      border-right: 5px solid red;
    }
    
    .team {
      margin-top: 10px;
      font-size: 13px;
      color: #bdc3c7;
    }
  </style>
</head>
<body>
  

  <main>
    <div class="card">
      <h3 class="text-danger">❌ Attendance Failed</h3>
      <p class="mt-3">
        Sorry, your attendance could not be recorded.
      </p>
      {% if msg %}
        <p style="color: gray;">Reason: {{ msg }}</p>
      {% else %}
        <p style="color: gray;">Possible reasons: Invalid details, expired QR, or attendance already marked.</p>
      {% endif %}
      <a href="javascript:history.back()" class="btn btn-secondary mt-3 w-100">⬅️ Try Again</a>
    </div>
  </main>

</body>
</html>
