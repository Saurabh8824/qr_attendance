{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Student Portal</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    transition:all 0.3s ease;
}

body{

    overflow:hidden;

    height:100vh;

    display:flex;

    flex-direction:column;

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* 🌙 DARK MODE */
body.dark{

    background:
    linear-gradient(135deg,#020617,#0f172a);
}

/* 🔥 Background Glow */
.bg-glow{

    position:fixed;

    width:400px;
    height:400px;

    border-radius:50%;

    background:
    rgba(99,102,241,0.18);

    filter:blur(120px);

    top:-120px;
    right:-100px;

    z-index:-1;
}

/* 🔥 TOPBAR */
.topbar{

    position:fixed;

    top:16px;

    left:50%;

    transform:translateX(-50%);

    width:92%;

    height:72px;

    border-radius:28px;

    background:
    rgba(255,255,255,0.22);

    backdrop-filter:blur(22px);

    -webkit-backdrop-filter:blur(22px);

    border:
    1px solid rgba(255,255,255,0.18);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.12);

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 20px;

    z-index:999;
}

body.dark .topbar{

    background:
    rgba(15,23,42,0.45);

    backdrop-filter:blur(24px);

    -webkit-backdrop-filter:blur(24px);

    border:
    1px solid rgba(255,255,255,0.06);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.35);
}

/* 🔥 Title */
.top-title{

    font-size:22px;

    font-weight:700;

    background:
    linear-gradient(90deg,#6366f1,#8b5cf6);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* 🔥 Theme Toggle */
.toggle-btn{

    width:46px;
    height:46px;

    border-radius:50%;

    background:
    linear-gradient(135deg,#6366f1,#8b5cf6);

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    cursor:pointer;

    box-shadow:
    0 10px 25px rgba(99,102,241,0.25);
}

.toggle-btn:hover{
    transform:rotate(20deg) scale(1.05);
}

/* 🔥 IFRAME */
/* 🔥 IFRAME WRAPPER */
.iframe-wrapper{

    position:relative;

    flex-grow:1;

    width:100%;

    height:calc(100vh - 180px);

    overflow:hidden;

    margin-top:0;

    margin-bottom:0;
}

/* 🔥 IFRAME */
iframe{

    width:100%;

    height:100%;

    border:none;

    background:transparent;

    backdrop-filter:blur(24px);
}

/* 🔥 TOP FADE */
.fade-top{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:80px;

    z-index:20;

    pointer-events:none;

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,1) 0%,
        rgba(255,255,255,0.95) 25%,
        rgba(255,255,255,0.5) 60%,
        rgba(255,255,255,0) 100%
    );
}

/* 🔥 BOTTOM FADE */
.fade-bottom{

    position:absolute;

    bottom:0;
    left:0;

    width:100%;
    height:80px;

    z-index:20;

    pointer-events:none;

    background:
    linear-gradient(
        to top,
        rgba(255,255,255,1) 0%,
        rgba(255,255,255,0.95) 25%,
        rgba(255,255,255,0.5) 60%,
        rgba(255,255,255,0) 100%
    );
}

/* 🌙 DARK MODE FADE */
body.dark .fade-top{

     background:
    linear-gradient(
        to bottom,
        rgba(2,6,23,1) 0%,
        rgba(2,6,23,0.95) 25%,
        rgba(2,6,23,0.55) 60%,
        rgba(2,6,23,0) 100%
    );
}

body.dark .fade-bottom{

     background:
    linear-gradient(
        to top,
        rgba(2,6,23,1) 0%,
        rgba(2,6,23,0.95) 25%,
        rgba(2,6,23,0.55) 60%,
        rgba(2,6,23,0) 100%
    );
}

/* 🔥 NAVBAR */
nav{

    position:fixed;

    bottom:14px;
    left:50%;

    transform:translateX(-50%);

    width:94%;

    height:82px;

    border-radius:30px;

    background:
    rgba(255,255,255,0.45);

    backdrop-filter:blur(22px);
    
    -webkit-backdrop-filter:blur(22px);

    border:
    1px solid rgba(255,255,255,0.22);

    display:flex;

    justify-content:space-around;

    align-items:center;

    z-index:100;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.06);
}

body.dark nav{

    background:
    rgba(15,23,42,0.55);
    
    backdrop-filter:blur(22px);

    border:
    1px solid rgba(255,255,255,0.06);
}

/* 🔥 Nav Item */
.nav-item{

    position:relative;

    width:68px;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    text-decoration:none;

    color:#64748b;

    font-size:11px;

    font-weight:600;

    z-index:2;

    padding-top:6px;
}

body.dark .nav-item{
    color:#94a3b8;
}

/* 🔥 ICON */
.nav-item i{

    font-size:21px;

    margin-bottom:4px;

    transition:0.35s ease;
}

/* 🔥 ACTIVE */
.nav-item.active{

    color:#7c3aed;
}

/* 🔥 ICON FLOAT */
.nav-item.active i{

    transform:translateY(-3px) scale(1.08);
}

/* 🔥 PREMIUM UNDERLINE */
.nav-item::after{

    content:'';

    position:absolute;

    bottom:-6px;

    left:50%;

    transform:translateX(-50%);

    width:0;

    height:5px;

    border-radius:20px;

    background:
    linear-gradient(90deg,#6366f1,#8b5cf6);

    box-shadow:
    0 0 12px rgba(99,102,241,0.45);

    transition:0.4s cubic-bezier(.68,-0.55,.27,1.55);
}

/* 🔥 ACTIVE LINE */
.nav-item.active::after{

    width:42px;
}




/* 🔥 Scan Button */
.scan-btn{

    transform:translateY(-22px);
}

.scan-circle{

    width:72px;
    height:72px;

    border-radius:50%;

    background:
    linear-gradient(135deg,#6366f1,#8b5cf6);

    display:flex;

    align-items:center;

    justify-content:center;

    color:white;

    font-size:28px;

    box-shadow:
    0 15px 35px rgba(99,102,241,0.35);

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.06);
    }

    100%{
        transform:scale(1);
    }
}

/* 🔥 Active Glow */
.nav-item.active i{

    animation:iconBounce 0.5s ease;
}

@keyframes iconBounce{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-4px);
    }

    100%{
        transform:translateY(0);
    }
}

/* 📱 Mobile */
@media(max-width:600px){

    .topbar{
        width:94%;
        height:64px;
    }

    .top-title{
        font-size:18px;
    }

    nav{
        height:78px;
    }

    .scan-circle{
        width:66px;
        height:66px;
    }

    .nav-item{
        font-size:10px;
    }

}

</style>

</head>

<body>

<!-- 🔥 Glow -->
<div class="bg-glow"></div>

<!-- 🔥 TOPBAR -->
<div class="topbar">

    <div class="top-title">
        Student Portal
    </div>

    <!-- 🌙 Theme -->
    <div class="toggle-btn"
         onclick="toggleTheme()">

        <i class="fa-solid fa-moon"></i>

    </div>

</div>

<!-- 🔥 IFRAME -->
<!-- 🔥 IFRAME WRAPPER -->
<div class="iframe-wrapper">

    <!-- TOP FADE -->
    <div class="fade-top"></div>

    <!-- IFRAME -->
    <iframe name="contentFrame"
            id="contentFrame"
            src="{% url 'student_dashboard' %}">
    </iframe>

    <!-- BOTTOM FADE -->
    <div class="fade-bottom"></div>

</div>

<!-- 🔥 NAVBAR -->
<nav>

    <!-- 🔥 Indicator -->

    <!-- Dashboard -->
    <a href="{% url 'student_dashboard' %}"
       target="contentFrame"
       class="nav-item active">

        <i class="fa-solid fa-chart-simple"></i>
        Dashboard

    </a>

    <!-- Timetable -->
    <a href="{% url 'student_timetable' %}"
       target="contentFrame"
       class="nav-item">

        <i class="fa-regular fa-calendar"></i>
        Timetable

    </a>

    <!-- Scan -->
    <a href="{% url 'student_scan' %}"
       target="contentFrame"
       class="nav-item scan-btn">

        <div class="scan-circle">
            <i class="fa-solid fa-qrcode"></i>
        </div>

    </a>

    <!-- Alerts -->
    <a href="{% url 'student_alerts' %}"
       target="contentFrame"
       class="nav-item">

        <i class="fa-regular fa-bell"></i>
        Alerts

    </a>

    <!-- Profile -->
    <a href="{% url 'student_profile' %}"
       target="contentFrame"
       class="nav-item">

        <i class="fa-regular fa-user"></i>
        Profile

    </a>

</nav>

<script>

/* 🔥 NAVIGATION */
const navItems =
document.querySelectorAll(".nav-item");


/* 🔥 Click */
navItems.forEach(item=>{

    item.addEventListener("click",()=>{

        navItems.forEach(i=>
            i.classList.remove("active")
        );

        item.classList.add("active");

    });

});

/* 🔥 Initial */
window.onload=()=>{


    // 🌙 restore theme
    if(localStorage.getItem("darkMode")==="true"){

        document.body.classList.add("dark");

        const icon =
        document.querySelector(".toggle-btn i");

        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");
    }

    updateIframeTheme();

};

/* 🌙 DARK MODE */
function toggleTheme(){

    document.body.classList.toggle("dark");

    let darkEnabled =
    document.body.classList.contains("dark");

    localStorage.setItem(
        "darkMode",
        darkEnabled
    );

    const icon =
    document.querySelector(".toggle-btn i");

    if(darkEnabled){

        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");

    }

    else{

        icon.classList.remove("fa-sun");
        icon.classList.add("fa-moon");
    }

    updateIframeTheme();
}

/* 🔥 iframe sync */
function updateIframeTheme(){

    const iframe =
    document.getElementById("contentFrame");

    try{

        let iframeBody =
        iframe.contentWindow.document.body;

        if(localStorage.getItem("darkMode")==="true"){

            iframeBody.classList.add("dark");

        }

        else{

            iframeBody.classList.remove("dark");
        }

    }

    catch(err){}
}

document.getElementById("contentFrame")
.addEventListener("load",updateIframeTheme);

</script>

</body>
</html>
