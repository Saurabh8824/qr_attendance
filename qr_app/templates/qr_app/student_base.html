{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal</title>

<!-- Preconnects for faster resource loading -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome – load only solid+regular subsets -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>

<!-- Inter font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ─── RESET & TOKENS ─── */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    /* Light palette */
    --bg-base:          #f0f4ff;
    --bg-secondary:     #e8edf8;
    --glass-bg:         rgba(255,255,255,0.55);
    --glass-border:     rgba(255,255,255,0.75);
    --glass-shadow:     0 8px 32px rgba(99,102,241,0.10), 0 2px 8px rgba(0,0,0,0.07);
    --glass-blur:       saturate(1.8) blur(28px);

    --nav-glass:        rgba(255,255,255,0.60);
    --nav-border:       rgba(255,255,255,0.80);

    --accent-1:         #6366f1;
    --accent-2:         #8b5cf6;
    --accent-grad:      linear-gradient(135deg, #6366f1, #8b5cf6);

    --text-primary:     #1e1b4b;
    --text-secondary:   #64748b;
    --text-muted:       #94a3b8;

    --nav-inactive:     #94a3b8;
    --nav-active:       #6366f1;

    --fade-top-color:   rgba(240,244,255,1);
    --fade-bot-color:   rgba(240,244,255,1);

    --radius-bar:       28px;
    --radius-nav:       36px;

    --transition-base:  0.18s ease;
    --transition-spring:0.22s cubic-bezier(0.34,1.2,0.64,1);
    --transition-page:  0.3s cubic-bezier(0.4,0,0.2,1);
}

body.dark {
    --bg-base:          #020617;
    --bg-secondary:     #0f172a;
    --glass-bg:         rgba(15,23,42,0.55);
    --glass-border:     rgba(255,255,255,0.08);
    --glass-shadow:     0 8px 40px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.04);
    --glass-blur:       saturate(1.6) blur(30px);

    --nav-glass:        rgba(15,23,42,0.62);
    --nav-border:       rgba(255,255,255,0.07);

    --text-primary:     #e2e8f0;
    --text-secondary:   #94a3b8;
    --text-muted:       #475569;

    --nav-inactive:     #4b5563;
    --nav-active:       #818cf8;

    --fade-top-color:   rgba(2,6,23,1);
    --fade-bot-color:   rgba(2,6,23,1);
}

/* ─── BASE ─── */
html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    transition: background 0.25s ease, color 0.25s ease;
    -webkit-font-smoothing: antialiased;
}

/* ─── ANIMATED GRADIENT MESH BG ─── */
.bg-mesh {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
    pointer-events: none;
}

.bg-mesh::before,
.bg-mesh::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
    animation: meshFloat 12s ease-in-out infinite alternate;
}

.bg-mesh::before {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #6366f1 0%, #8b5cf6 60%, transparent 100%);
    top: -180px; right: -120px;
}

.bg-mesh::after {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #06b6d4 0%, #3b82f6 60%, transparent 100%);
    bottom: -140px; left: -100px;
    animation-delay: -6s;
    animation-direction: alternate-reverse;
}

body.dark .bg-mesh::before { opacity: 0.18; }
body.dark .bg-mesh::after  { opacity: 0.12; }

@keyframes meshFloat {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(20px,28px) scale(1.05); }
}

/* ─── TOPBAR ─── */
.topbar {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    height: 68px;
    border-radius: var(--radius-bar);
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 18px;
    z-index: 999;
    /* subtle inner highlight — iPhone chrome feel */
    background-image: linear-gradient(
        180deg,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.04) 100%
    );
    transition: background var(--transition-base),
                border-color var(--transition-base),
                box-shadow var(--transition-base);
}

body.dark .topbar {
    background: var(--glass-bg);
    background-image: linear-gradient(
        180deg,
        rgba(255,255,255,0.07) 0%,
        rgba(255,255,255,0.01) 100%
    );
    border-color: var(--glass-border);
}

/* notch-style pill on top */
.topbar::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 3px;
    border-radius: 0 0 6px 6px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
    opacity: 0.6;
}

body.dark .topbar::before {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}

/* ─── TOP TITLE ─── */
.top-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: var(--accent-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* ─── TOPBAR RIGHT GROUP ─── */
.topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* ─── GLASS PILL BUTTON ─── */
.glass-pill-btn {
    height: 40px;
    padding: 0 16px;
    border-radius: 50px;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.20);
    color: var(--accent-1);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background var(--transition-base),
                transform var(--transition-spring),
                box-shadow var(--transition-base);
}

.glass-pill-btn:hover {
    background: rgba(99,102,241,0.18);
    box-shadow: 0 2px 10px rgba(99,102,241,0.16);
}

.glass-pill-btn:active {
    transform: scale(0.97);
}

/* ─── THEME TOGGLE ─── */
.toggle-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent-grad);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(99,102,241,0.28);
    border: 1.5px solid rgba(255,255,255,0.30);
    transition: transform var(--transition-spring),
                box-shadow var(--transition-base);
    position: relative;
    overflow: hidden;
}

.toggle-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
}

.toggle-btn:hover {
    transform: rotate(12deg) scale(1.05);
    box-shadow: 0 8px 24px rgba(99,102,241,0.32);
}

.toggle-btn:hover::before { opacity: 1; }

.toggle-btn:active {
    transform: scale(0.95);
}

.toggle-btn i {
    font-size: 17px;
    transition: transform 0.14s ease, opacity 0.14s ease;
}

/* ─── MAIN CONTENT ─── */
.main-content {
    position: relative;
    height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
}

.main-content::-webkit-scrollbar { display: none; }

/* ─── PAGE TRANSITION WRAPPER ─── */
.content-wrapper {
    padding-top: 100px;
    padding-bottom: 116px;
    /* page enter animation */
    animation: pageEnter var(--transition-page) both;
}

@keyframes pageEnter {
    from {
        opacity: 0;
        transform: translateY(14px) scale(0.995);
        filter: blur(2px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

/* ─── FADES ─── */
.fade-top, .fade-bottom {
    position: fixed;
    left: 0;
    width: 100%;
    height: 90px;
    pointer-events: none;
    z-index: 20;
    transition: background 0.5s ease;
}

.fade-top {
    top: 0;
    background: linear-gradient(
        to bottom,
        var(--fade-top-color) 0%,
        color-mix(in srgb, var(--fade-top-color) 80%, transparent) 40%,
        transparent 100%
    );
}

.fade-bottom {
    bottom: 0;
    background: linear-gradient(
        to top,
        var(--fade-bot-color) 0%,
        color-mix(in srgb, var(--fade-bot-color) 80%, transparent) 40%,
        transparent 100%
    );
}

/* fallback for browsers without color-mix */
@supports not (background: color-mix(in srgb, red 50%, blue)) {
    .fade-top {
        background: linear-gradient(to bottom, var(--fade-top-color) 0%, rgba(240,244,255,0.7) 40%, transparent 100%);
    }
    .fade-bottom {
        background: linear-gradient(to top, var(--fade-bot-color) 0%, rgba(240,244,255,0.7) 40%, transparent 100%);
    }
    body.dark .fade-top {
        background: linear-gradient(to bottom, rgba(2,6,23,1) 0%, rgba(2,6,23,0.7) 40%, transparent 100%);
    }
    body.dark .fade-bottom {
        background: linear-gradient(to top, rgba(2,6,23,1) 0%, rgba(2,6,23,0.7) 40%, transparent 100%);
    }
}

/* ─── NAVBAR ─── */
nav {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    height: 80px;
    border-radius: var(--radius-nav);
    background: var(--nav-glass);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--nav-border);
    box-shadow: var(--glass-shadow),
                inset 0 1px 0 rgba(255,255,255,0.55);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
    transition: background var(--transition-base),
                border-color var(--transition-base),
                box-shadow var(--transition-base);
    /* inner highlight */
    background-image: linear-gradient(
        180deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.05) 100%
    );
}

body.dark nav {
    background: var(--nav-glass);
    background-image: linear-gradient(
        180deg,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.01) 100%
    );
    box-shadow: var(--glass-shadow),
                inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ─── ACTIVE PILL INDICATOR ─── */
.nav-indicator {
    position: absolute;
    height: 48px;
    border-radius: 20px;
    background: linear-gradient(135deg,
        rgba(99,102,241,0.16) 0%,
        rgba(139,92,246,0.10) 100%);
    border: 1px solid rgba(99,102,241,0.18);
    backdrop-filter: blur(8px);
    pointer-events: none;
    z-index: 0;
    /* JS sets left + width */
    transition: left 0.45s cubic-bezier(0.34,1.3,0.64,1),
                width 0.4s cubic-bezier(0.4,0,0.2,1),
                opacity 0.3s ease;
}

/* ─── NAV ITEM ─── */
.nav-item {
    position: relative;
    width: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--nav-inactive);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.2px;
    z-index: 2;
    padding-top: 4px;
    border-radius: 20px;
    transition: color var(--transition-base),
                transform var(--transition-spring);
}

.nav-item i {
    font-size: 20px;
    margin-bottom: 3px;
    transition: transform var(--transition-spring),
                color var(--transition-base);
}

.nav-item:hover {
    color: var(--nav-active);
    transform: translateY(-1px);
}

.nav-item:hover i {
    transform: scale(1.08);
}

.nav-item.active {
    color: var(--nav-active);
}

.nav-item.active i {
    transform: translateY(-2px) scale(1.1);
    filter: drop-shadow(0 2px 6px rgba(99,102,241,0.4));
    animation: iconPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes iconPop {
    0%   { transform: translateY(0) scale(1); }
    40%  { transform: translateY(-5px) scale(1.2); }
    70%  { transform: translateY(-1px) scale(0.97); }
    100% { transform: translateY(-2px) scale(1.1); }
}

/* Label fade */
.nav-item span {
    transition: opacity var(--transition-base),
                transform var(--transition-base);
    opacity: 0.75;
}
.nav-item.active span,
.nav-item:hover span {
    opacity: 1;
}

/* ─── SCAN (CENTER FAB) ─── */
.scan-btn {
    transform: translateY(-18px);
    width: 72px !important;
}

.scan-circle {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: var(--accent-grad);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 26px;
    box-shadow: 0 10px 32px rgba(99,102,241,0.40),
                0 2px 8px rgba(99,102,241,0.20),
                inset 0 1px 0 rgba(255,255,255,0.30);
    border: 1.5px solid rgba(255,255,255,0.25);
    transition: transform var(--transition-spring),
                box-shadow var(--transition-base);
    position: relative;
    overflow: hidden;
}

/* scan circle shimmer */
.scan-circle::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 60%;
    height: 200%;
    background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255,255,255,0.28) 50%,
        transparent 70%
    );
    animation: shimmer 4s ease-in-out infinite;
}

@keyframes shimmer {
    0%   { left: -60%; opacity: 0; }
    20%  { opacity: 1; }
    60%  { left: 120%; opacity: 1; }
    61%  { opacity: 0; }
    100% { left: 120%; opacity: 0; }
}

.scan-btn:hover .scan-circle {
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 16px 44px rgba(99,102,241,0.50),
                0 4px 12px rgba(99,102,241,0.28);
}

.scan-btn:active .scan-circle {
    transform: scale(0.95);
}

/* pulse ring – fires once on hover, not infinitely */
.scan-circle-wrap {
    position: relative;
    display: inline-flex;
}

.pulse-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2px solid rgba(99,102,241,0.35);
    opacity: 0;
    pointer-events: none;
}

.scan-btn:hover .pulse-ring {
    animation: pulseRing 0.7s cubic-bezier(0.4,0,0.6,1) forwards;
}

.scan-btn:hover .pulse-ring:nth-child(2) { animation-delay: 0.18s; }

@keyframes pulseRing {
    0%   { transform: scale(0.9); opacity: 0.55; }
    100% { transform: scale(1.3); opacity: 0; }
}

/* ─── PAGE SLIDE TRANSITION ─── */
/* Applied via JS on nav click */
.page-exit {
    animation: pageExit 0.28s cubic-bezier(0.4,0,1,1) both;
}
.page-enter {
    animation: pageEnter 0.45s cubic-bezier(0,0,0.2,1) both;
}

@keyframes pageExit {
    from { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    to   { opacity: 0; transform: translateY(-8px) scale(0.99); filter: blur(2px); }
}

/* ─── CARD GLASS UTILITY ─── */
.glass-card {
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    box-shadow: var(--glass-shadow);
    background-image: linear-gradient(
        160deg,
        rgba(255,255,255,0.15) 0%,
        rgba(255,255,255,0.03) 100%
    );
    transition: transform var(--transition-spring),
                box-shadow var(--transition-base),
                border-color var(--transition-base);
}

.glass-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(99,102,241,0.12),
                0 2px 10px rgba(0,0,0,0.06);
    border-color: rgba(99,102,241,0.20);
}

body.dark .glass-card {
    background-image: linear-gradient(
        160deg,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.01) 100%
    );
}

/* ─── SCROLL FADE-IN FOR CARDS ─── */
.reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.55s ease, transform 0.55s ease;
}

.reveal.visible {
    opacity: 1;
    transform: translateY(0);
}

/* ─── MOBILE ─── */
@media (max-width: 600px) {
    .topbar {
        width: 94%;
        height: 62px;
        top: 10px;
    }

    .top-title { font-size: 17px; }

    nav {
        height: 74px;
        width: 94%;
        bottom: 10px;
    }

    .scan-circle {
        width: 62px;
        height: 62px;
        font-size: 22px;
    }

    .scan-btn { transform: translateY(-16px); }

    .nav-item { font-size: 10px; width: 58px; }
    .nav-item i { font-size: 19px; }

    .content-wrapper {
        padding-top: 90px;
        padding-bottom: 106px;
    }
}

/* ─── 3-DOT MENU ─── */
.dots-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(99,102,241,0.10);
    border: 1px solid rgba(99,102,241,0.18);
    color: var(--accent-1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: background var(--transition-base), box-shadow var(--transition-base);
    position: relative;
    flex-shrink: 0;
}

.dots-btn:hover {
    background: rgba(99,102,241,0.18);
    box-shadow: 0 2px 10px rgba(99,102,241,0.16);
}

.dots-btn:active { transform: scale(0.95); }

.dots-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    min-width: 160px;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    box-shadow: var(--glass-shadow), 0 16px 40px rgba(0,0,0,0.10);
    padding: 6px;
    z-index: 9999;
    transform-origin: top right;
    transform: scale(0.88) translateY(-6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.18s cubic-bezier(0.34,1.2,0.64,1);
}

body.dark .dots-menu {
    box-shadow: var(--glass-shadow), 0 16px 40px rgba(0,0,0,0.30);
}

.dots-menu.open {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: all;
}

.dots-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    text-decoration: none;
    transition: background var(--transition-base), color var(--transition-base);
    white-space: nowrap;
}

.dots-menu-item:hover {
    background: rgba(99,102,241,0.10);
    color: var(--accent-1);
}

.dots-menu-item.danger {
    color: #ef4444;
}

.dots-menu-item.danger:hover {
    background: rgba(239,68,68,0.10);
    color: #ef4444;
}

.dots-menu-item i {
    width: 16px;
    text-align: center;
    font-size: 13px;
}

/* dots-btn wrapper needs position relative */
.dots-wrap {
    position: relative;
}

</style>

</head>

<body>

<!-- ─── ANIMATED MESH BG ─── -->
<div class="bg-mesh"></div>

<!-- ─── TOPBAR ─── -->
<div class="topbar" id="topbar">

    <div class="top-title">Student Portal</div>

    <div class="topbar-right">

        <!-- optional date chip -->
        <div class="glass-pill-btn" id="datePill">
            <i class="fa-regular fa-calendar-check"></i>
            <span id="dateText"></span>
        </div>

        <!-- dark/light toggle -->
        <div class="toggle-btn" onclick="toggleTheme()" id="themeToggle" title="Toggle theme">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </div>

        <!-- 3-dot menu -->
        <div class="dots-wrap">
            <div class="dots-btn" id="dotsBtn" onclick="toggleDotsMenu()" title="More options" aria-label="More options">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
            <div class="dots-menu" id="dotsMenu">
                <a href="{% url 'user_logout' %}" class="dots-menu-item danger">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout
                </a>
            </div>
        </div>

    </div>

</div>

<!-- ─── TOP FADE ─── -->
<div class="fade-top"></div>

<!-- ─── MAIN CONTENT ─── -->
<div class="main-content" id="mainContent">

    <div class="content-wrapper" id="contentWrapper">

        {% block content %}
        {% endblock %}

    </div>

</div>

<!-- ─── BOTTOM FADE ─── -->
<div class="fade-bottom"></div>

<!-- ─── NAVBAR ─── -->
<nav id="navbar">

    <!-- Sliding pill indicator (positioned by JS) -->
    <div class="nav-indicator" id="navIndicator"></div>

    <!-- Dashboard -->
    <a href="{% url 'student_dashboard' %}"
       class="nav-item {% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}"
       data-nav="dashboard">
        <i class="fa-solid fa-chart-simple"></i>
        <span>Dashboard</span>
    </a>

    <!-- Timetable -->
    <a href="{% url 'student_timetable' %}"
       class="nav-item {% if request.resolver_match.url_name == 'student_timetable' %}active{% endif %}"
       data-nav="timetable">
        <i class="fa-regular fa-calendar"></i>
        <span>Timetable</span>
    </a>

    <!-- Scan FAB -->
    <a href="{% url 'student_scan' %}"
       class="nav-item scan-btn {% if request.resolver_match.url_name == 'student_scan' %}active{% endif %}"
       data-nav="scan">
        <div class="scan-circle-wrap">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="scan-circle">
                <i class="fa-solid fa-qrcode"></i>
            </div>
        </div>
    </a>

    <!-- Alerts -->
    <a href="{% url 'student_alerts' %}"
       class="nav-item {% if request.resolver_match.url_name == 'student_alerts' %}active{% endif %}"
       data-nav="alerts">
        <i class="fa-regular fa-bell"></i>
        <span>Alerts</span>
    </a>

    <!-- Profile -->
    <a href="{% url 'student_profile' %}"
       class="nav-item {% if request.resolver_match.url_name == 'student_profile' %}active{% endif %}"
       data-nav="profile">
        <i class="fa-regular fa-user"></i>
        <span>Profile</span>
    </a>

</nav>

<script>

/* ════════════════════════════════════════
   THEME
════════════════════════════════════════ */

function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    const icon = document.getElementById('themeIcon');
    // Spin out, swap, spin in
    icon.style.transform = 'rotate(180deg) scale(0.6)';
    icon.style.opacity = '0';
    setTimeout(() => {
        if (dark) {
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            icon.classList.replace('fa-sun', 'fa-moon');
        }
        icon.style.transform = 'rotate(0deg) scale(1)';
        icon.style.opacity = '1';
    }, 140);
}

function toggleTheme() {
    const isDark = document.body.classList.contains('dark');
    applyTheme(!isDark);
    localStorage.setItem('darkMode', String(!isDark));
}

/* ════════════════════════════════════════
   3-DOT MENU
════════════════════════════════════════ */

function toggleDotsMenu() {
    const menu = document.getElementById('dotsMenu');
    menu.classList.toggle('open');
}

// Close menu on outside click
document.addEventListener('click', function(e) {
    const wrap = document.querySelector('.dots-wrap');
    if (wrap && !wrap.contains(e.target)) {
        document.getElementById('dotsMenu').classList.remove('open');
    }
});

// Close menu on Escape
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        document.getElementById('dotsMenu').classList.remove('open');
    }
});

/* ════════════════════════════════════════
   SLIDING NAV INDICATOR
════════════════════════════════════════ */

function moveIndicator(el) {
    const indicator = document.getElementById('navIndicator');
    if (!el) { indicator.style.opacity = '0'; return; }
    const nav = document.getElementById('navbar');
    const navRect = nav.getBoundingClientRect();
    const itemRect = el.getBoundingClientRect();
    const left = itemRect.left - navRect.left + (itemRect.width / 2) - 36;
    indicator.style.left = left + 'px';
    indicator.style.width = '72px';
    indicator.style.opacity = '1';
}

/* ════════════════════════════════════════
   PAGE TRANSITION ON NAV CLICK
════════════════════════════════════════ */

const navItems = document.querySelectorAll('.nav-item');
const contentWrapper = document.getElementById('contentWrapper');

navItems.forEach(item => {
    item.addEventListener('click', function(e) {
        // Remove active from all
        navItems.forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        moveIndicator(this);

        // Slide transition
        contentWrapper.classList.add('page-exit');
        setTimeout(() => {
            contentWrapper.classList.remove('page-exit');
            contentWrapper.classList.add('page-enter');
            setTimeout(() => contentWrapper.classList.remove('page-enter'), 500);
        }, 280);
    });
});

/* ════════════════════════════════════════
   TOPBAR SCROLL SHADOW
════════════════════════════════════════ */

const mainContent = document.getElementById('mainContent');
const topbar = document.getElementById('topbar');

mainContent.addEventListener('scroll', () => {
    const scrolled = mainContent.scrollTop > 10;
    topbar.style.boxShadow = scrolled
        ? '0 12px 48px rgba(99,102,241,0.18), 0 2px 8px rgba(0,0,0,0.12)'
        : 'var(--glass-shadow)';
});

/* ════════════════════════════════════════
   SCROLL REVEAL
════════════════════════════════════════ */

function initReveal() {
    const revealEls = document.querySelectorAll('.reveal');
    if (!revealEls.length) return;
    const observer = new IntersectionObserver(entries => {
        entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
                setTimeout(() => {
                    entry.target.classList.add('visible');
                }, i * 60);
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    revealEls.forEach(el => observer.observe(el));
}

/* ════════════════════════════════════════
   DATE CHIP
════════════════════════════════════════ */

function updateDateChip() {
    const opts = { weekday:'short', month:'short', day:'numeric' };
    document.getElementById('dateText').textContent =
        new Date().toLocaleDateString('en-US', opts);
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */

window.addEventListener('DOMContentLoaded', () => {

    // Theme
    const savedDark = localStorage.getItem('darkMode') === 'true';
    applyTheme(savedDark);

    // Date chip
    updateDateChip();

    // Nav indicator initial position
    const activeItem = document.querySelector('.nav-item.active');
    if (activeItem) {
        // Small delay so layout is painted
        requestAnimationFrame(() => moveIndicator(activeItem));
    }

    // Reveal observer
    initReveal();

});

/* Update indicator on window resize */
window.addEventListener('resize', () => {
    const activeItem = document.querySelector('.nav-item.active');
    if (activeItem) moveIndicator(activeItem);
});

</script>
<script>

const params =
new URLSearchParams(window.location.search);

if(params.get("access") === "denied"){

    alert("Access Denied");

    window.history.replaceState(
        {},
        document.title,
        window.location.pathname
    );
}

</script>
</body>
</html>
