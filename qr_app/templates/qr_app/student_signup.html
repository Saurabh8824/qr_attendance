{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Student Signup</title>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{

    --primary:#6366f1;
    --secondary:#8b5cf6;
    --glass:
    rgba(255,255,255,0.12);

    --border:
    rgba(255,255,255,0.18);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    transition:all 0.3s ease;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    overflow-x:hidden;

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(135deg,#020617,#0f172a);

    position:relative;
}

/* 🔥 Background Glow */
.bg-glow{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;
}

.glow1{

    width:420px;
    height:420px;

    background:
    rgba(99,102,241,0.28);

    top:-120px;
    left:-120px;

    animation:float 8s infinite ease-in-out;
}

.glow2{

    width:350px;
    height:350px;

    background:
    rgba(139,92,246,0.25);

    bottom:-120px;
    right:-100px;

    animation:float2 9s infinite ease-in-out;
}

@keyframes float{

    50%{
        transform:translateY(25px);
    }
}

@keyframes float2{

    50%{
        transform:translateX(-25px);
    }
}

/* 🔥 Signup Card */
.signup-card{

    width:100%;

    max-width:520px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.12);

    border-radius:32px;

    padding:30px 24px;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.35);

    animation:fadeUp 0.6s ease;
}

/* 🔥 Header */
.header{

    text-align:center;

    margin-bottom:26px;
}

.logo{

    width:82px;
    height:82px;

    margin:auto;

    border-radius:24px;

    background:
    linear-gradient(135deg,#6366f1,#8b5cf6);

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    font-size:34px;

    box-shadow:
    0 15px 35px rgba(99,102,241,0.35);
}

.header h2{

    margin-top:18px;

    font-size:30px;

    color:white;
}

.header p{

    margin-top:8px;

    color:#cbd5e1;

    font-size:14px;
}

/* 🔥 Section */
.section-title{

    color:#e2e8f0;

    font-size:13px;

    margin:22px 0 14px;

    letter-spacing:1px;

    text-transform:uppercase;
}

/* 🔥 Grid */
.form-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;
}

/* 🔥 Field */
.field{

    position:relative;

    margin-bottom:16px;
}

.field.full{
    grid-column:1/3;
}

/* 🔥 Input */
.field input,
.field select{

    width:100%;

    padding:16px 14px;

    border-radius:18px;

    border:
    1px solid rgba(255,255,255,0.12);

    background:
    rgba(255,255,255,0.06);

    color:white;

    font-size:14px;

    outline:none;

    backdrop-filter:blur(10px);
}

/* 🔥 Placeholder */
.field input::placeholder{
    color:#cbd5e1;
}

/* 🔥 Focus */
.field input:focus,
.field select:focus{

    border:
    1px solid rgba(99,102,241,0.8);

    box-shadow:
    0 0 18px rgba(99,102,241,0.35);

    transform:translateY(-2px);
}

/* 🔥 Select */
.field select{

    appearance:none;

    color:#e2e8f0;
}

/* 🔥 Button */
.btn{

    width:100%;

    padding:16px;

    border:none;

    border-radius:20px;

    background:
    linear-gradient(135deg,#6366f1,#8b5cf6);

    color:white;

    font-size:15px;

    font-weight:700;

    cursor:pointer;

    margin-top:12px;

    box-shadow:
    0 15px 35px rgba(99,102,241,0.3);
}

.btn:hover{

    transform:translateY(-3px) scale(1.01);

    box-shadow:
    0 20px 45px rgba(99,102,241,0.4);
}

/* 🔥 Login Link */
.login-link{

    text-align:center;

    margin-top:20px;

    color:#cbd5e1;

    font-size:14px;
}

.login-link a{

    color:#a78bfa;

    text-decoration:none;

    font-weight:600;
}

/* ✨ Animation */
@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 📱 Mobile */
@media(max-width:600px){

    .signup-card{

        padding:24px 18px;

        border-radius:28px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .field.full{
        grid-column:auto;
    }

    .header h2{
        font-size:25px;
    }

}

</style>

</head>

<body>

<!-- 🔥 Background -->
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<!-- 🔥 Signup -->
<div class="signup-card">

    <!-- 🔥 Header -->
    <div class="header">

        <div class="logo">
            🎓
        </div>

        <h2>Student Signup</h2>

        <p>
            Create your smart attendance account
        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        <!-- 🔥 LOGIN -->
        <div class="section-title">
            Login Credentials
        </div>

        <div class="form-grid">

            <div class="field full">
                <input type="text"
                       name="username"
                       placeholder="Username">
            </div>

            <div class="field">
                <input type="password"
                       name="password1"
                       placeholder="Password">
            </div>

            <div class="field">
                <input type="password"
                       name="password2"
                       placeholder="Confirm Password">
            </div>

        </div>

        <!-- 🔥 PERSONAL -->
        <div class="section-title">
            Personal Details
        </div>

        <div class="form-grid">

            <div class="field">
                <input type="text"
                       name="enrollment"
                       placeholder="Enrollment No">
            </div>

            <div class="field">
                <input type="text"
                       name="roll"
                       placeholder="Roll No">
            </div>

            <div class="field full">
                <input type="text"
                       name="name"
                       placeholder="Full Name">
            </div>

            <div class="field">
                <input type="text"
                       name="father"
                       placeholder="Father Name">
            </div>

            <div class="field">
                <input type="text"
                       name="mother"
                       placeholder="Mother Name">
            </div>

            <div class="field full">
                <input type="date"
                       name="dob">
            </div>

        </div>

        <!-- 🔥 ACADEMIC -->
        <div class="section-title">
            Academic Info
        </div>

        <div class="form-grid">

            <div class="field">

                <select id="year"
                        name="year">

                    <option value="">
                        Select Year
                    </option>

                    <option value="1">
                        1st Year
                    </option>

                    <option value="2">
                        2nd Year
                    </option>

                    <option value="3">
                        3rd Year
                    </option>

                </select>

            </div>

            <div class="field">

                <select id="semester"
                        name="semester">

                    <option value="">
                        Select Semester
                    </option>

                </select>

            </div>

            <div class="field full">

                <select name="branch">

                    <option value="">
                        Select Branch
                    </option>

                    {% for b in branches %}

                    <option value="{{ b.id }}">
                        {{ b.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- 🔥 CONTACT -->
        <div class="section-title">
            Contact Details
        </div>

        <div class="form-grid">

            <div class="field">
                <input type="email"
                       name="email"
                       placeholder="Email Address">
            </div>

            <div class="field">
                <input type="text"
                       name="mobile"
                       placeholder="Mobile Number">
            </div>

        </div>

        <!-- 🔥 Button -->
        <button class="btn">

            🚀 Create Account

        </button>

    </form>

    <!-- 🔥 Login -->
    <div class="login-link">

        Already have an account?

        <a href="{% url 'user_login' %}">
            Login
        </a>

    </div>

</div>

<script>

/* 🔥 YEAR → SEMESTER */
document.getElementById("year")
.addEventListener("change", function(){

    let sem =
    document.getElementById("semester");

    sem.innerHTML =
    '<option value="">Select Semester</option>';

    if(this.value=="1"){

        sem.innerHTML +=
        '<option value="1">Sem 1</option>';

        sem.innerHTML +=
        '<option value="2">Sem 2</option>';
    }

    else if(this.value=="2"){

        sem.innerHTML +=
        '<option value="3">Sem 3</option>';

        sem.innerHTML +=
        '<option value="4">Sem 4</option>';
    }

    else if(this.value=="3"){

        sem.innerHTML +=
        '<option value="5">Sem 5</option>';

        sem.innerHTML +=
        '<option value="6">Sem 6</option>';
    }

});

</script>

</body>
</html>
