{% extends 'qr_app/student_base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ══ THEME TOKENS ══ */
:root {
    --bg:            #f0f4ff;
    --surface:       #ffffff;
    --surface-2:     #f8faff;
    --border:        rgba(99,102,241,0.11);
    --text-primary:  #0f172a;
    --text-secondary:#475569;
    --text-muted:    #94a3b8;
    --accent:        #4f46e5;
    --accent-2:      #7c3aed;
    --accent-3:      #0ea5e9;
    --shadow-sm:     0 2px 8px rgba(79,70,229,0.07);
    --shadow-md:     0 8px 28px rgba(79,70,229,0.12);
    --shadow-lg:     0 20px 55px rgba(79,70,229,0.18);
    --radius-sm:     10px;
    --radius-md:     18px;
    --radius-lg:     24px;
    --radius-xl:     32px;

    /* slot colours */
    --c1: #4f46e5; --c1-bg: #eef2ff; --c1-soft: rgba(79,70,229,0.12);
    --c2: #10b981; --c2-bg: #f0fdf4; --c2-soft: rgba(16,185,129,0.12);
    --c3: #f59e0b; --c3-bg: #fffbeb; --c3-soft: rgba(245,158,11,0.12);
    --c4: #f43f5e; --c4-bg: #fff1f3; --c4-soft: rgba(244,63,94,0.12);
    --c5: #8b5cf6; --c5-bg: #f5f3ff; --c5-soft: rgba(139,92,246,0.12);
}

/* ── DARK MODE ── */
body.dark {
    --bg:            #060a14;
    --surface:       #0f1628;
    --surface-2:     #141d35;
    --border:        rgba(99,102,241,0.16);
    --text-primary:  #f1f5f9;
    --text-secondary:#94a3b8;
    --text-muted:    #475569;
    --shadow-sm:     0 2px 10px rgba(0,0,0,0.3);
    --shadow-md:     0 8px 28px rgba(0,0,0,0.35);
    --shadow-lg:     0 20px 55px rgba(0,0,0,0.45);

    --c1-bg: rgba(79,70,229,0.15);   --c1-soft: rgba(79,70,229,0.18);
    --c2-bg: rgba(16,185,129,0.14);  --c2-soft: rgba(16,185,129,0.18);
    --c3-bg: rgba(245,158,11,0.13);  --c3-soft: rgba(245,158,11,0.18);
    --c4-bg: rgba(244,63,94,0.13);   --c4-soft: rgba(244,63,94,0.18);
    --c5-bg: rgba(139,92,246,0.14);  --c5-soft: rgba(139,92,246,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.4s ease;
}

/* ── BG ORBS ── */
body::before {
    content: '';
    position: fixed;
    top: -140px; right: -100px;
    width: 440px; height: 440px;
    background: radial-gradient(circle, rgba(79,70,229,0.1) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none; z-index: 0;
}
body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none; z-index: 0;
}

/* ── CONTAINER ── */
.tt-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 100px;
    position: relative; z-index: 1;
}

/* ══ HERO HEADER ══ */
.tt-header {
    background: linear-gradient(145deg, #4f46e5 0%, #7c3aed 52%, #0ea5e9 100%);
    border-radius: var(--radius-xl);
    padding: 28px 22px 24px;
    margin-bottom: 18px;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow-lg);
    animation: slideDown 0.55s cubic-bezier(.22,.68,0,1.2) both;
}
.tt-header::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    top: -140px; right: -70px;
}
.tt-header::after {
    content: '';
    position: absolute;
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    bottom: -60px; left: -30px;
}

.tt-header-inner {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 16px;
}

.header-icon {
    width: 58px; height: 58px;
    border-radius: 18px;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.28);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    flex-shrink: 0;
}

.header-text h2 {
    font-size: 21px; font-weight: 800; color: #fff;
    margin-bottom: 5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.header-text p {
    font-size: 12px; color: rgba(255,255,255,0.74); font-weight: 500;
}

/* ══ DATE NAV ══ */
.date-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
    animation: fadeUp 0.5s 0.1s ease both;
    transition: background 0.4s, border-color 0.4s;
}

.arrow-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(79,70,229,0.28);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    flex-shrink: 0;
}
.arrow-btn:active { transform: scale(0.9); }

.date-center { text-align: center; flex: 1; }

.date-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 3px;
}

.date-value {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
}

.date-weekday {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 2px;
}

/* ══ DAY TABS ══ */
.day-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 20px;
    scrollbar-width: none;
    animation: fadeUp 0.5s 0.15s ease both;
    -webkit-overflow-scrolling: touch;
}
.day-tabs::-webkit-scrollbar { display: none; }

.day-btn {
    padding: 9px 18px;
    border-radius: 100px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
    flex-shrink: 0;
}

.day-btn:active { transform: scale(0.95); }

.active-day {
    background: linear-gradient(135deg, var(--accent), var(--accent-2)) !important;
    color: #fff !important;
    border-color: transparent !important;
    box-shadow: 0 8px 22px rgba(79,70,229,0.3) !important;
    transform: translateY(-1px);
}

/* ══ SECTION LABEL ══ */
.section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-left: 4px;
    animation: fadeUp 0.5s 0.2s ease both;
}

/* ══ TIMETABLE CARDS ══ */
#timetableContainer {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.tt-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    align-items: stretch;
    box-shadow: var(--shadow-sm);
    animation: fadeUp 0.5s ease both;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.4s;
}
.tt-card:active { transform: scale(0.99); }

/* colour stripe */
.tt-stripe {
    width: 5px;
    flex-shrink: 0;
}
.color1 .tt-stripe { background: var(--c1); }
.color2 .tt-stripe { background: var(--c2); }
.color3 .tt-stripe { background: var(--c3); }
.color4 .tt-stripe { background: var(--c4); }
.color5 .tt-stripe { background: var(--c5); }

/* time block */
.time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 16px;
    gap: 4px;
    min-width: 80px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
}

.color1 .time-block { background: var(--c1-bg); }
.color2 .time-block { background: var(--c2-bg); }
.color3 .time-block { background: var(--c3-bg); }
.color4 .time-block { background: var(--c4-bg); }
.color5 .time-block { background: var(--c5-bg); }

.time-start {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
}
.color1 .time-start { color: var(--c1); }
.color2 .time-start { color: var(--c2); }
.color3 .time-start { color: var(--c3); }
.color4 .time-start { color: var(--c4); }
.color5 .time-start { color: var(--c5); }

.time-sep {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
}

.time-end {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
}

/* subject info */
.subject-info {
    flex: 1;
    padding: 16px 18px;
    min-width: 0;
}

.subject-name {
    font-size: 15px; font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.subject-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.meta-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
}

.meta-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0;
}
.color1 .meta-dot { background: var(--c1); }
.color2 .meta-dot { background: var(--c2); }
.color3 .meta-dot { background: var(--c3); }
.color4 .meta-dot { background: var(--c4); }
.color5 .meta-dot { background: var(--c5); }

/* subject code chip */
.code-chip {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1px solid transparent;
}
.color1 .code-chip { background: var(--c1-soft); color: var(--c1); border-color: rgba(79,70,229,0.2); }
.color2 .code-chip { background: var(--c2-soft); color: var(--c2); border-color: rgba(16,185,129,0.2); }
.color3 .code-chip { background: var(--c3-soft); color: #92400e; border-color: rgba(245,158,11,0.2); }
.color4 .code-chip { background: var(--c4-soft); color: var(--c4); border-color: rgba(244,63,94,0.2); }
.color5 .code-chip { background: var(--c5-soft); color: var(--c5); border-color: rgba(139,92,246,0.2); }

/* ══ EMPTY STATE ══ */
.empty-box {
    background: var(--surface);
    border: 1.5px dashed rgba(99,102,241,0.2);
    border-radius: var(--radius-lg);
    padding: 52px 20px;
    text-align: center;
    animation: fadeUp 0.5s 0.2s ease both;
    transition: background 0.4s;
}
.empty-icon {
    font-size: 52px;
    display: block; margin-bottom: 14px;
    animation: float 3s ease-in-out infinite;
}
.empty-box h3 {
    font-size: 18px; font-weight: 700;
    color: var(--text-primary); margin-bottom: 7px;
}
.empty-box p {
    font-size: 13px; color: var(--text-muted); font-weight: 500;
}

/* ══ LOADING STATE ══ */
.skeleton {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    height: 96px;
    overflow: hidden;
    position: relative;
}
.skeleton::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
        transparent 0%,
        rgba(99,102,241,0.07) 50%,
        transparent 100%);
    animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
}

/* ══ ANIMATIONS ══ */
@keyframes slideDown {
    from { opacity:0; transform:translateY(-20px); }
    to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
}
@keyframes float {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-10px); }
}

/* ══ ANDROID / MOBILE ══ */
@media (max-width: 600px) {
    .tt-container  { padding: 14px 12px 90px; }
    .tt-header     { padding: 22px 16px 20px; }
    .header-text h2{ font-size: 18px; }
    .date-value    { font-size: 16px; }
    .time-block    { min-width: 70px; padding: 14px 12px; }
    .time-start    { font-size: 13px; }
    .subject-name  { font-size: 14px; }
    .subject-info  { padding: 13px 14px; }
}

@media (max-width: 380px) {
    .time-block { min-width: 62px; padding: 12px 10px; }
}
</style>

<div class="tt-container">

    <!-- ══ HERO ══ -->
    <div class="tt-header">
        <div class="tt-header-inner">
            <div class="header-icon">📅</div>
            <div class="header-text">
                <h2>Timetable</h2>
                <p>Your daily class schedule</p>
            </div>
        </div>
    </div>

    <!-- ══ DATE NAV ══ -->
    <div class="date-nav">

        <button class="arrow-btn" onclick="changeDate(-1)" aria-label="Previous day">&#8592;</button>

        <div class="date-center">
            <div class="date-label">Showing schedule for</div>
            <div class="date-value" id="dateText"></div>
            <div class="date-weekday" id="dateWeekday"></div>
        </div>

        <button class="arrow-btn" onclick="changeDate(1)" aria-label="Next day">&#8594;</button>

    </div>

    <!-- ══ DAY TABS ══ -->
    <div class="day-tabs">

        {% for d in days %}
        <a href="?day={{ d }}"
           class="day-btn {% if selected_day == d %}active-day{% endif %}">
            {{ d }}
        </a>
        {% endfor %}

    </div>

    <!-- ══ SECTION LABEL ══ -->
    <div class="section-label" id="sectionLabel">Today's Classes</div>

    <!-- ══ TIMETABLE ══ -->
    <div id="timetableContainer">
        <!-- skeleton loaders -->
        <div class="skeleton"></div>
        <div class="skeleton" style="animation-delay:0.1s;opacity:0.7;"></div>
        <div class="skeleton" style="animation-delay:0.2s;opacity:0.5;"></div>
    </div>

</div>

<script>
let currentDate = new Date();

const COLORS = ['color1','color2','color3','color4','color5'];

function formatDate(date) {
    return date.toISOString().split('T')[0];
}

function updateDateUI() {
    const opts = { day: 'numeric', month: 'short', year: 'numeric' };
    document.getElementById('dateText').innerText =
        currentDate.toLocaleDateString('en-IN', opts);

    const weekday = currentDate.toLocaleString('en-US', { weekday: 'long' });
    document.getElementById('dateWeekday').innerText = weekday;

    const dayShort = currentDate.toLocaleString('en-US', { weekday: 'short' });

    document.querySelectorAll('.day-btn').forEach(btn => {
        btn.classList.remove('active-day');
        if (btn.innerText.trim() === dayShort) btn.classList.add('active-day');
    });

    const isToday = formatDate(currentDate) === formatDate(new Date());
    document.getElementById('sectionLabel').innerText =
        isToday ? "Today's Classes" : weekday + "'s Classes";

    loadTimetable();
}

function changeDate(value) {
    currentDate.setDate(currentDate.getDate() + value);
    updateDateUI();
}

function loadTimetable() {
    const date = formatDate(currentDate);
    const container = document.getElementById('timetableContainer');

    // show skeletons
    container.innerHTML = `
        <div class="skeleton"></div>
        <div class="skeleton" style="opacity:0.7;margin-top:14px;"></div>
        <div class="skeleton" style="opacity:0.5;margin-top:14px;"></div>
    `;

    fetch(`/attendance/student/timetable/ajax/?date=${date}`)
        .then(res => res.json())
        .then(data => {
            container.innerHTML = '';

            if (!data.timetable || data.timetable.length === 0) {
                container.innerHTML = `
                    <div class="empty-box">
                        <span class="empty-icon">🌤️</span>
                        <h3>No Classes Today</h3>
                        <p>Enjoy your free day — well deserved! 😎</p>
                    </div>
                `;
                return;
            }

            data.timetable.forEach((t, i) => {
                const color = COLORS[i % COLORS.length];
                const card = document.createElement('div');
                card.className = `tt-card ${color}`;
                card.style.animationDelay = `${0.1 + i * 0.07}s`;
                card.innerHTML = `
                    <div class="tt-stripe"></div>
                    <div class="time-block">
                        <span class="time-start">${t.start}</span>
                        <span class="time-sep">to</span>
                        <span class="time-end">${t.end}</span>
                    </div>
                    <div class="subject-info">
                        <div class="subject-name">${t.subject}</div>
                        <div class="subject-meta">
                            <div class="meta-row">
                                <span class="meta-dot"></span>
                                <span>📍 ${t.room}</span>
                            </div>
                            <div class="meta-row">
                                <span class="meta-dot"></span>
                                <span>👨‍🏫 ${t.teacher}</span>
                            </div>
                        </div>
                        <div class="code-chip">${t.code}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        })
        .catch(() => {
            container.innerHTML = `
                <div class="empty-box">
                    <span class="empty-icon">⚠️</span>
                    <h3>Connection Error</h3>
                    <p>Could not load timetable. Please try again.</p>
                </div>
            `;
        });
}

updateDateUI();
</script>

{% endblock %}
